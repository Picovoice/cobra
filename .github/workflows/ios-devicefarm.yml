name: iOS AWS Device Farm Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'binding/ios/CobraAppTest/**'
      - '.github/workflows/ios-devicefarm.yml'
      - 'script/automation/devicefarm.py'

  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
    paths:
      - 'binding/ios/CobraAppTest/**'
      - '.github/workflows/ios-devicefarm.yml'
      - 'script/automation/devicefarm.py'

defaults:
  run:
    working-directory: binding/ios/CobraAppTest

jobs:
  build:
    name: Run iOS Tests on AWS Device Farm
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run:
          pip3 install requests boto3

      - name: Make build dir
        run: mkdir ddp

      - name: Inject AccessKey
        run: sed -i '.bak' 's:{TESTING_ACCESS_KEY_HERE}:${{secrets.PV_VALID_ACCESS_KEY}}:'
          CobraAppTestUITests/CobraAppTestUITests.swift

      - name: Inject Device
        run: sed -i '.bak' 's:{TESTING_DEVICE_HERE}:cpu\:1:' CobraAppTestUITests/CobraAppTestUITests.swift

      - name: XCode Build
        run: xcrun xcodebuild build-for-testing
          -configuration Debug
          -project CobraAppTest.xcodeproj
          -sdk iphoneos
          -scheme CobraAppTest
          -derivedDataPath ddp
          CODE_SIGNING_ALLOWED=NO

      - name: Generating ipa
        run: cd ddp/Build/Products/Debug-iphoneos/ &&
          mkdir Payload &&
          cp -r CobraAppTest.app Payload &&
          zip --symlinks -r CobraAppTest.ipa Payload &&
          rm -r Payload

      - name: Zipping Tests
        run: cd ddp/Build/Products/Debug-iphoneos/ &&
          zip --symlinks -r CobraAppTestUITests.zip CobraAppTestUITests-Runner.app

      - name: Run tests on AWS Device Farm
        run: python3 ../../../script/automation/devicefarm.py
          --type ios
          --run_name cobra-ios-unit
          --app_path "ddp/Build/Products/Debug-iphoneos/CobraAppTest.ipa"
          --test_path "ddp/Build/Products/Debug-iphoneos/CobraAppTestUITests.zip"
          --aws_id "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_ID}}"
          --aws_secret "${{secrets.AWS_DEVICE_FARM_ACCESS_KEY_SECRET}}"
          --project_arn "${{secrets.AWS_DEVICE_FARM_PROJECT_ARN}}"
          --test_spec_arn "${{secrets.AWS_DEVICE_FARM_IOS_TEST_SPEC_ARN}}"
          --device_pool_arn "${{secrets.AWS_DEVICE_FARM_IOS_DEVICE_POOL_ARN}}"
